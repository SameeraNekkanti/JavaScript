<!DOCTYPE html>
<html>
    <head>
        <title>
            form
        </title>
        <style>
            body {
            background-color: pink;
            font-family: 'Segoe UI', Roboto, sans-serif;
            
            justify-content: center;
        }
        input:valid{
            
            border-color: blue;
        }
        input:invalid{
            border-color: red;
        }
        input:disabled{
            border-color: grey;
        }
        button{
            background-color: aqua;
            padding: 10px 20px ;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        </style>
        <script>
            function mouseOver(button){
button.style.backgroundColor="darkblue";
button.style.color="white";

            }
            function mouseOut(button){
                button.style.backgroundColor="aqua"
                button.style.color="black";
            }
            function onFocus(x){
                x.style.color="blue";
            }
            function onBlur(x){
                x.style.color="green";
            }
            function countChar(){
                var chars=document.getElementById("text").value;
                var add=chars.length;
                document.getElementById("char").innerHTML=add+ " characters";


            }
            function showDept() {
    var dept = document.getElementById("select").value;
    document.getElementById("deptMsg").innerHTML = "Selected: " + dept;
}



            
        </script>
    </head>
    <body>
        <script>
            function validateForm(){


                var num=document.getElementById("num").value;
                if(isNaN(num) || num==""||num<1||num>100){
                    alert("Roll number should be less than 100");
                    return false;
                }
                var age=document.getElementById("age").value;
                if(age<1 || age>100){
                    alert("invalid roll nu");
                    return false;
                }
                
                var name=document.getElementById("name").value;
                if(!isNaN(name) || name==""){
                    alert("Name should contain only alphabets");
                    return false;
                }
                var check1=document.getElementById("check1").checked;
                var check2=document.getElementById("check2").checked;

                if(!check1 && !check2){
                    alert("Select at least one category");
                    return false;
                }
                var gender1 = document.getElementById("1").checked;
            var gender2 = document.getElementById("2").checked;

            if (!gender1 && !gender2) {
                alert("Please select gender");
                return false;
            }
            var address = document.getElementById("text").value;
            var dept = document.getElementById("select").value;

            if (name === "" || num === "" || address === "" || dept === "") {
                alert("No field should be empty");
                return false;
            }
            alert("form submitted successfully");
            return true;


            }
        </script>
        <h1>LIBRARY MEMBER FORM</h1>
        <form name="myForm" onsubmit="return validateForm()">
            Member Name <input type="text"id="name"onfocus="onFocus(this)" onblur="onBlur(this)"required>
            <br><br>
            Roll Number <input type="number"id="num"required>
            <br><br>
            Age <input type="number"id="age"required>
            <br><br>
            Gender<input type="radio"id="1"name="k">Female 
            <input type="radio"id="2"name="k">Male
            <br><br>
            Department<select id="select"required onchange="showDept()">
            <option value="">Select Department</option>
            <option>CSE</option>
            <option>BBA</option>
            </select><br>
            <p id="deptMsg">select a dept.</p>
            <br>
            Interested categories
            <input type="checkbox"id="check1"> Fiction
            <input type="checkbox"id="check2"> Non-Fiction
            <br><br>
            Address 
            <textarea id="text"rows="3"cols="10"onkeyup="countChar()"></textarea><p id="char"></p>
            <br><br>
            <button type="submit"onmouseover="mouseOver(this)"onmouseout="mouseOut(this)">Submit</button>
        </form>
    </body>
</html>
