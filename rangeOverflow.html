<!--range underflow-->
<html>
    <body>
        <p>enter a number</p>
        <input id="id2"type="number"min="100">
        <button onclick="myFunc()">ok</button>
        <p>no. nono less than 100</p>
        <p id="para"></p>
        <script>
            function myFunc(){
                var txt="";
                if(document.getElementById("id2").validity.rangeUnderflow){
                    txt="input too small";
                }else{
                    txt="input valid";
                }
                document.getElementById("para").innerHTML=txt;

            }
        </script>
    </body>
</html>
